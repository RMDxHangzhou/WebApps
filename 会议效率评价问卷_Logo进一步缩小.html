<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议效率评价问卷</title>
  <style>
    :root {
      --blue: #0a6ed1;
      --blue2: #3b82f6;
      --bg: #f4f7fb;
      --text: #172033;
      --muted: #677489;
      --line: #dce4ef;
      --ok: #16a34a;
      --bad: #dc2626
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 0, #dbeafe 0, transparent 32%), linear-gradient(145deg, #f8fbff, #edf3f9);
      color: var(--text);
      padding: 24px
    }

    .container {
      width: min(760px, 100%);
      margin: auto
    }

    .hero {
      padding: 20px 28px;
      margin-bottom: 18px;
      border-radius: 24px;
      background: linear-gradient(135deg, #075cab, #1591e8);
      color: #fff;
      box-shadow: 0 18px 45px rgba(10, 110, 209, .22);
      position: relative;
      overflow: hidden
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 22px
    }

    .hero-logo {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      object-fit: contain;
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: block
    }

    .hero-copy {
      min-width: 0;
      flex: 1
    }
    .hero-user {
      flex: 0 0 auto;
      margin-left: auto;
      color: #fff;
      font-size: 13px;
      line-height: 1.4;
      text-align: right;
      white-space: nowrap
    }
    .hero-user strong {
      display: inline;
      font-size: 13px;
      font-weight: 700
    }
    .hero:after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      right: -70px;
      top: -100px;
      background: rgba(255, 255, 255, .12)
    }

    .hero-kicker {
      font-size: 13px;
      letter-spacing: 1.5px;
      opacity: .82;
      margin-bottom: 8px
    }

    .hero h1 {
      font-size: 28px
    }

    .hero-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 9px
    }
    .hero p {
      margin: 0;
      font-size: 14px;
      opacity: .85
    }

    .card {
      background: #fff;
      border: 1px solid rgba(213, 224, 238, .9);
      border-radius: 24px;
      padding: 30px 34px;
      box-shadow: 0 15px 40px rgba(40, 72, 110, .09)
    }

    .question {
      padding: 22px 0;
      border-bottom: 1px solid #edf1f6
    }

    .question:first-of-type {
      padding-top: 0
    }

    .question:last-of-type {
      border-bottom: 0
    }

    .q-title {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px
    }

    .num {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      border-radius: 8px;
      background: #e8f3ff;
      color: var(--blue);
      font-size: 13px
    }

    .required {
      color: #ef4444;
      margin-left: 3px
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin: -3px 0 12px 36px
    }

    .control {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      padding: 0 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: .2s
    }

    .control:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .13)
    }

    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .choice {
      cursor: pointer
    }

    .choice input {
      position: absolute;
      opacity: 0
    }

    .choice span {
      height: 62px;
      border: 1px solid var(--line);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-weight: 600;
      background: #fbfdff;
      transition: .2s
    }

    .choice input:checked+span {
      border-color: var(--blue);
      background: #eaf4ff;
      color: #075cab;
      box-shadow: 0 0 0 3px rgba(10, 110, 209, .10)
    }

    .submit-btn,
    .login-btn {
      width: 100%;
      border: 0;
      border-radius: 13px;
      background: linear-gradient(135deg, #075cab, #168fe3);
      color: #fff;
      font-weight: 700;
      cursor: pointer
    }

    .submit-btn {
      height: 50px;
      margin-top: 25px;
      font-size: 15px;
      box-shadow: 0 10px 22px rgba(10, 110, 209, .22)
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      box-shadow: none
    }

    .user-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 14px
    }

    .error {
      display: none;
      color: var(--bad);
      font-size: 12px;
      margin-top: 8px
    }

    .invalid {
      border-color: var(--bad) !important
    }

    .login-overlay,
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d3156, #0a6ed1);
      padding: 20px
    }

    .login-card {
      width: min(390px, 100%);
      background: #fff;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, .25)
    }

    .login-logo {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      background: #e8f3ff;
      color: var(--blue);
      font-size: 24px;
      font-weight: 800
    }

    .login-card h2 {
      text-align: center
    }

    .login-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin: 7px 0 22px
    }

    .login-group {
      margin-bottom: 16px
    }

    .login-group label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 600
    }

    .login-input {
      width: 100%;
      height: 45px;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 0 13px;
      outline: none
    }

    .login-input:focus {
      border-color: var(--blue)
    }

    .login-btn {
      height: 46px;
      margin-top: 24px
    }

    .input-error {
      border-color: var(--bad) !important
    }

    .loading-overlay {
      display: none;
      background: rgba(15, 35, 58, .82);
      z-index: 10000
    }

    .loading-box {
      background: #fff;
      border-radius: 18px;
      padding: 28px 36px;
      text-align: center
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #dbeafe;
      border-top-color: var(--blue);
      border-radius: 50%;
      margin: auto;
      animation: spin .8s linear infinite
    }

    .loading-text {
      margin-top: 13px;
      font-weight: 700
    }

    .loading-subtext {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .success {
      display: none;
      text-align: center;
      padding: 28px
    }

    .success-icon {
      font-size: 48px
    }

    .success h2 {
      margin: 12px 0 6px
    }

    .new-btn {
      margin-top: 20px;
      height: 46px;
      padding: 0 28px;
      border: 0;
      border-radius: 12px;
      background: #eaf4ff;
      color: #075cab;
      font-weight: 700;
      cursor: pointer
    }

    @media(max-width:560px) {
      body {
        padding: 12px
      }

      .hero {
        padding: 17px 18px
      }

      .hero-inner {
        gap: 14px
      }

      .hero-logo {
        width: 38px;
        height: 38px;
        flex-basis: 38px;
        padding: 0
      }

      .hero h1 {
        font-size: 21px
      }

      .hero-bottom {
        gap: 10px
      }

      .hero p {
        font-size: 12px
      }

      .hero-user,
      .hero-user strong {
        font-size: 11px
      }

      .card {
        padding: 24px 20px
      }

      .choice-grid {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

          placeholder="请输入 UPI"></div>
      <button id="loginBtn" class="login-btn" disabled>登入系统</button>
    </div>
  </div>
