                        eng2searchedInfo = Crt_Working_Engs.filter(a => (a.crbd5_name == eng2search));

                            arr_index_start++
                            Crt_owner_Engs_Arr.push({ ...eng2searchedInfo[0], "当前接单任务": Bussing_Engs.filter(a => (a.crbd5_eng_locked == eng2searchedInfo[0].crbd5_name && a.crbd5_status_val >= 1 && a.crbd5_status_val <= 2)).length, "索引": arr_index_start, "优先级": Bussing_Engs.filter(a => (a.crbd5_eng_locked == eng2searchedInfo[0].crbd5_name && a.crbd5_status_val >= 1 && a.crbd5_status_val <= 2)).length * 1000 + Bussing_Engs.filter(a => (a.crbd5_eng_locked == eng2searchedInfo[0].crbd5_name)).length });
                            // Crt_owner_Engs_Arr.sort((a, b) => {
                            //     if (a.优先级 !== b.优先级) {

                            //         return a.优先级 - b.优先级;

                    Crt_Working_Engs.forEach((a1, b, c) => {

                                class="phone-link">点击可联系他</a>)${a.当前接单任务 == 0 ? "" : "<Span style='color: white;background-color: #873535;padding: 5px;font-size: 12px;'>忙X" + a.当前接单任务 + "</Span>"}`);
                        };
                    });

                    try {
                        crt_got_status = parseInt(baoxiulist[0]['crbd5_status_val'])
                    } catch (error) {
                        crt_got_status = 0
                    };
                    正在维修的工程师接单数 = function () {
                        try {
                            return Bussing_Engs.filter(a2 => (a2.crbd5_eng_locked == baoxiulist[0].crbd5_eng_locked && a2.crbd5_status_val >= 1 && a2.crbd5_status_val <= 2)).length;
                        } catch (error) {
                            return 0

                        }
                    };
                    $('#eng_4_selected').html(
                        //设定指派工程师
                        (crt_got_status == 0 || crt_got_status == 3) ? (Crt_owner_Engs_Arr.map(A => (`<option value="${A.crbd5_name}||${A.crbd5_phone_no}" >${A.crbd5_name}  ${A.当前接单任务 == 0 ? "" : "（当前维修任务：" + A.当前接单任务 + "个）"}</option>`))) : (`<option value="${baoxiulist[0].crbd5_eng_locked}||${baoxiulist[0].crbd5_eng_phone_no_locked}" >${baoxiulist[0].crbd5_eng_locked}  ${正在维修的工程师接单数() == 0 ? "" : "(当前维修任务：" + 正在维修的工程师接单数() + "个)"}</option>`)

                    );


                    /*    //debugger */


                    baoxiulist.forEach(crtitem => (
                        $('#HistoryDetail').html(
                            baoxiulist.map((crtitem, index) => (

                                `<tr><td>${index + 1}</td><td>${crtitem.crbd5_submit_time.replace('T', ' ').replace('Z', '')}</td><td>${crtitem.crbd5_trigger_reason}</td><td>${crtitem.crbd5_status_des}</td><td>${crtitem.crbd5_completion_duration ? ((crtitem.crbd5_completion_duration / 60).toFixed(1)) : ""}</td></tr>`

                        crbd5_completion_confirm_by = baoxiulist[0]['crbd5_completion_confirm_by_upi'];
                        crbd5_completion_confirm_by_upi = baoxiulist[0]['crbd5_arrival_eng'];
                        status_val = (baoxiulist[0]['crbd5_status_val'] == 3 || !baoxiulist[0]['crbd5_status_val']) ? 0 : baoxiulist[0]['crbd5_status_val'];
                        trigger_reason = baoxiulist[0]['crbd5_trigger_reason'];
                        SelectedEngVal = baoxiulist[0]['crbd5_eng_locked'] + '||' + baoxiulist[0]['crbd5_eng_phone_no_locked'];
                        submitby = baoxiulist[0]['crbd5_submit_by'];
                        submitby_UPI = baoxiulist[0]['crbd5_submit_upi'];
                        rec_ID = baoxiulist[0]['crbd5_equipmentmaintenanceinformationid'];
                        submitby_time = baoxiulist[0]['crbd5_submit_time'];

                    } else { status_val = 0; $('#status').text('未报修') };
                    if (status_val > 0 && status_val < 3) { 开始报修() };

                    var checkval1 = $('#Crt_baoxiuren').val();
                    var checkval2 = $('#Crt_baoxiuren_No').val();

                    var checkval4 = $('#Reason').val();

                    if (checkval3.length) { $('#eng_4_selected').css('border-color', 'black') };
                    if (checkval4.length) { $('#Reason').css('border-color', 'black') };

                    $('.waiting').css('display', 'none');

        function 开始报修() {

            kaishibaoxiu = !kaishibaoxiu

            if (!kaishibaoxiu) {
                $('.baoxiuFunction').hide();
                $('.baoxiuFunction1').hide();
                $('.baoxiuFunction2').show();
                $('#baoxiu').show();
                $('.Crt_baoxiuren').hide();
                $('#timer').hide();
                $('#报修类型').hide();
                $('#到场工程师').hide();




            } else {


                $('.baoxiuFunction').css('display', 'table-row');
                $('.baoxiuFunction1').css('display', 'flex');
                $('.baoxiuFunction2').hide();
                $('#baoxiu').hide();
                $('.Crt_baoxiuren').show();
                $(`#Reason`).css('height', (status_val == 2) ? '60px' : '120px');

                for (let index = 1; index <= status_val; index++) {
                    $(`.Step${index}`).hide();
                };

                $(`.Step${status_val + 1}`).show();
                if (status_val > 0) {
                    $(`#Reason`).css('height', (status_val == 2) ? '60px' : '120px');
                    $(`.Step23`).show();
                    $('#Crt_baoxiuren,#Crt_baoxiuren_No,#Reason,#eng_4_selected').prop("disabled", true);
                    $('#eng_4_selected').css('background-color', '#ffffff00');
                    $('#Crt_baoxiuren').val(submitby);
                    $('#Crt_baoxiuren_No').val(submitby_UPI);
                    $('#eng_4_selected').val()
                    $('#Reason').val(trigger_reason);
                    $('#eng_4_selected').val(SelectedEngVal);
                    $('#timer').show();


                }
                else {
                    $(`.Step23`).hide();
                    $('.Step2,.Step3').hide();
                    $('#Crt_baoxiuren,#Crt_baoxiuren_No,#Reason').prop("disabled", false);// #eng_4_selected
                    $('#Crt_baoxiuren').val(localStorage.getItem("submitby"));
                    $('#Crt_baoxiuren_No').val(localStorage.getItem("submitby_UPI"));
                    $('#Reason').val('');
                    $('#eng_4_selected').css('background-color', '#ffffff');
                    var checkval1 = $('#Crt_baoxiuren').val();
                    var checkval2 = $('#Crt_baoxiuren_No').val();
                    var checkval3 = $('#Crt_baoxiuren').val();
                    var checkval4 = $('#Reason').val();
                    $('#Crt_baoxiuren').css('border-color', (!checkval1.length ? 'red' : 'black'));
                    $('#Crt_baoxiuren_No').css('border-color', (!checkval2.length ? 'red' : 'black'));
                    $('#eng_4_selected').css('border-color', (!checkval3.length ? 'red' : 'black'));
                    $('#Reason').css('border-color', (!checkval4.length ? 'red' : 'black'));
                    $('#submitbtn').prop('disabled', !checkval1.length || !checkval2.length || !checkval3.length || !checkval4.length);
                    if (checkval1.length && checkval2.length && checkval3.length && checkval4.length) { $('#submitbtn').css('background-color', 'rgb(4, 122, 67)') } else { $('#submitbtn').css('background-color', 'rgb(165, 165, 165)') };

                }

            }

        };

            submitby = $('#Crt_baoxiuren').val();

            Typ = $('[name=设备报修类型]:checked').val();
            Send_to_maximo = $('[name=触发maximo选择]:checked').val();
            cancelreason = $('#取消原因').val();
            $.ajax({
                url: `https://prod-185.westus.logic.azure.com:443/workflows/fd7fa8c5f8cb462eb14d062bb32e7a5e/triggers/manual/paths/invoke?api-version=2016-06-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=2TUX-bxhnWEqpnc3RE4cEFodt-jh74B6llAZwS-pM-E&Function=填写报修信息&EquipmentName=${equipmentName}&EquipmentNo=${equipmentNo}&trigger_reason=${trigger_reason}&submitby=${submitby}&submitby_UPI=${submitby_UPI}&status_val=${(status_val ? status_val : 0) + 1}&Rec_Id=${rec_ID ? rec_ID : ''}&Canceled=${Canceled}&SelectedEngVal=${SelectedEngVal}&cancelreason=${cancelreason}&Typ=${Typ}&CrtStatusVal=${status_val}&Modify_By=${Crt_Employee}&Modify_By_upi=${Crt_Employee_No}&Send_to_maximo=${Send_to_maximo}&web_open_time_stamp=${web_open_time_stamp}&Maintenance_Get_TimeStamp=${Maintenance_Get_TimeStamp}&1Hour_Notify=${MappingList[0].crbd5_1hour_notify}&2Hour_Notify=${MappingList[0].crbd5_2hour_notify}&1Hour_Notify_Msg=${MappingList[0].crbd5_1hour_msg_to}&2Hour_Notify_Msg=${MappingList[0].crbd5_2hour_msg_to}`,
                method: 'GET',
                success(response) {

                    if (response.Status_Match == "否") {

                        alert(response.Alert);
                        location.reload();

                    } else {
                        baoxiulist = [response.HistoryList];
                        baoxiulist.forEach(crtitem => (
                            $('#HistoryDetail').html(
                                baoxiulist.map((crtitem, index) => (

                                    `<tr><td>${index + 1}</td><td>${crtitem.crbd5_submit_time.replace('T', ' ').replace('Z', '')}</td><td>${crtitem.crbd5_trigger_reason}</td><td>${crtitem.crbd5_status_des}</td><td>${(crtitem.crbd5_completion_duration / 60).toFixed(1)}</td></tr>`

                                )))

                        ));
                        if (baoxiulist) { status_val = (baoxiulist[0]['crbd5_status_val'] == 3 || !baoxiulist[0]['crbd5_status_val']) ? 0 : baoxiulist[0]['crbd5_status_val'] } else { status_val = 0 };
                        trigger_reason = baoxiulist[0]['crbd5_trigger_reason'];
                        SelectedEngVal = baoxiulist[0]['crbd5_eng_locked'] + '||' + baoxiulist[0]['crbd5_eng_phone_no_locked'];
                        submitby = baoxiulist[0]['crbd5_submit_by'];
                        submitby_UPI = baoxiulist[0]['crbd5_submit_upi'];
                        rec_ID = baoxiulist[0]['crbd5_equipmentmaintenanceinformationid'];
                        submitby_time = baoxiulist[0]['crbd5_submit_time'];
                        $('#status').text(baoxiulist[0]['crbd5_status_des'] == "完成维修" ? "未报修" : baoxiulist[0]['crbd5_status_des']);
                        kaishibaoxiu = (status_val == 0);
                        扫描报修清单();
                        // if (kaishibaoxiu) { };
                        开始报修();
                        if ($('#status').text() == "未报修") { $('#status').css('color', 'green') } else { $('#status').css('color', 'red') };

                        $('.waiting').css('display', 'none');
                        //debugger
                        if ($(bntval).val() == "点击提交") { makeCall() };
                    }





                },

                error(xhr) {
                    console.error(xhr.status);
                }
            });

        };

        $('#Crt_baoxiuren,#Crt_baoxiuren_No,#eng_4_selected,#Reason').on('change', function () {
            var checkval1 = $('#Crt_baoxiuren').val();
            var checkval2 = $('#Crt_baoxiuren_No').val();
            var checkval3 = $('#Crt_baoxiuren').val();
            var checkval4 = $('#Reason').val();
            $('#Crt_baoxiuren').css('border-color', (!checkval1.length ? 'red' : 'black'));
            $('#Crt_baoxiuren_No').css('border-color', (!checkval2.length ? 'red' : 'black'));
            $('#eng_4_selected').css('border-color', (!checkval3.length ? 'red' : 'black'));
            $('#Reason').css('border-color', (!checkval4.length ? 'red' : 'black'));
            $('#submitbtn').prop('disabled', !checkval1.length || !checkval2.length || !checkval3.length || !checkval4.length);
            if (checkval1.length && checkval2.length && checkval3.length && checkval4.length) { $('#submitbtn').css('background-color', 'rgb(4, 122, 67)') } else { $('#submitbtn').css('background-color', 'rgb(165, 165, 165)') };
        })
        function makeCall() { window.location.href = 'tel:' + Crt_owner_Engs_Arr[0]['crbd5_phone_no']; }

        function updateTimer() {
            const targetDate = new Date(submitby_time);
            const now = new Date(new Date().getTime() + 8 * 60 * 60 * 1000);

            const difference = now - targetDate;

            // 计算小时、分钟和秒
            const hours = Math.floor(difference / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // 更新显示
            document.getElementById('timer').innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        };


        function 更新与查询个人信息() {

            Crt_Employee = $('#User_Name').val();
            配置角色权限();
            localStorage.setItem('Crt_Employee', Crt_Employee);
            submitby = Crt_Employee;
            localStorage.setItem('submitby', submitby);

            Crt_Employee_No = $('#User_No').val();
            localStorage.setItem('Crt_Employee_No', Crt_Employee_No);
            submitby_UPI = Crt_Employee_No;
            localStorage.setItem('submitby_UPI', submitby_UPI);



            $.ajax({
                url: `https://default5b268d572a6f4e04b0de6938583d5e.bc.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4292dca0ca5b4d73bba67a60be6bd8bd/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Nw4wplK72TmmRvKGYTfxIYu4UyMuMXFlE-p6uoTjxFM&C_Q=&Function=UPI&UPI=${Crt_Employee_No}&Name=${Crt_Employee}`,
                method: 'GET',
                success(response) {
                    Crt_Employee_Email = response.邮箱;
                    localStorage.setItem('Crt_Employee_Email', Crt_Employee_Email);
                    Crt_Employee_Phone = response.手机号码;
                    localStorage.setItem('Crt_Employee_Phone', Crt_Employee_Phone);
                    $('#peopleimg').attr('src', `https://default5b268d572a6f4e04b0de6938583d5e.bc.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/72bb177f2ea6470ca65a84f89f832cca/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=X3MB_ykuxwkGi472oYk97EcMVlOJdYg7aJsjNdTdA-o&C_Q=&Function=邮箱查询&Email=${Crt_Employee_Email}`);
                    $('.waiting').hide();
                },

                error(xhr) {
                    console.error(xhr.status);
                }
            });


        };


        function 维修类型重置() {

            $('#维修类型容器').html(`<span style="color: #000075;font-weight: bold;"><input checked style="width: 15px;height: 15px" type="radio"
                            name="设备报修类型" id="设备维修" value="设备维修">设备维修</span>
                    <span style="color: #0a4d38;font-weight: bold;"><input style="width: 15px;height: 15px;;" type="radio" name="设备报修类型"
                            id="设备调整" value="设备调整">设备调整</span>`)

        };
        function 触发maximo重置() {

            $('#触发maximo').prop('checked', false);
            $('#不触发maximo').prop('checked', true);

        };
        function 取消原因重置() {

            $('#取消原因').val(``)

        };

        //必填为空时边框变红
        $('[required]').on('change',
            必填项空值时边框变红
        );

        function getLocalISOString() {
            const now = new Date();
            const offsetMs = now.getTimezoneOffset() * 60 * 1000;
            const localTime = new Date(now.getTime() - offsetMs);
            return localTime.toISOString().slice(0, 19).replace('T', ' ');
        };

        function 必填项空值时边框变红() {
            $('[required]').each(function () {
                if ($(this).val() === '') {
                    $(this).css('border', '1px solid red');
                } else { $(this).css('border', '1px solid black'); }
            });
        };

        function 配置角色权限() {


            switch (true) {
                case EngList_Arr.some(a => a.EngName === Crt_Employee):
                    my_Role = "工程师";
                    $('#工程师已到场').prop('disabled', false);
                    $('#工程师已到场').css('background-color', 'rgb(4, 65, 122)');
                    $('#取消维修按钮').prop('disabled', true);
                    $('#取消维修按钮').css('background-color', 'rgb(165, 165, 165)');
                    $('#完成维修按钮').prop('disabled', true);
                    $('#完成维修按钮').css('background-color', 'rgb(165, 165, 165)');
                    break;
                case Advance_Operators.some(a => a.crbd5_name === Crt_Employee):
                    my_Role = "高级操作员";
                    $('#工程师已到场').prop('disabled', false);
                    $('#工程师已到场').css('background-color', 'rgb(4, 65, 122)');
                    $('#取消维修按钮').prop('disabled', false);
                    $('#取消维修按钮').css('background-color', 'rgb(53, 2, 2)');
                    $('#完成维修按钮').prop('disabled', false);
                    $('#完成维修按钮').css('background-color', 'rgb(4, 122, 67)');
                    break;
                default:
                    my_Role = "员工";
                    $('#工程师已到场').prop('disabled', true);
                    $('#工程师已到场').css('background-color', 'rgb(165, 165, 165)');
                    $('#取消维修按钮').prop('disabled', false);
                    $('#取消维修按钮').css('background-color', 'rgb(53, 2, 2)');
                    $('#完成维修按钮').prop('disabled', false);
                    $('#完成维修按钮').css('background-color', 'rgb(4, 122, 67)');
                    break;
            }
        };

        // 每秒更新一次
        setInterval(updateTimer, 1000);
        setInterval(function () {
            if (status_val === 0) {
                扫描报修清单(); // 只有当 status_val 为 0 时才执行
            }
        }, 60000)

        // 页面加载时立即更新一次
        updateTimer();


    </script>
